openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dispo? API — friend event planning
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Event management
  - name: participants
    description: Event participants
  - name: availabilities
    description: Availability slots
  - name: activities
    description: Activity swipe / voting
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event and get a share code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{shareCode}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event by share code
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found

  /events/{shareCode}/participants:
    get:
      operationId: listParticipants
      tags: [participants]
      summary: List all participants for an event
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Participant"
    post:
      operationId: joinEvent
      tags: [participants]
      summary: Join an event as a participant (no account required)
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParticipantInput"
      responses:
        "201":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Participant"
        "404":
          description: Event not found

  /events/{shareCode}/availabilities:
    get:
      operationId: listAvailabilities
      tags: [availabilities]
      summary: Get all availability slots for an event
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All availability slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"
    post:
      operationId: submitAvailabilities
      tags: [availabilities]
      summary: Submit availability slots for a participant
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityInput"
      responses:
        "201":
          description: Saved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailabilitySlot"
        "404":
          description: Event or participant not found

  /events/{shareCode}/best-slot:
    get:
      operationId: getBestSlot
      tags: [availabilities]
      summary: Get the best matching time slot across all participants
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Best slot result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BestSlot"
        "404":
          description: Event not found

  /events/{shareCode}/activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: Get activities to swipe for this event
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /events/{shareCode}/activity-votes:
    post:
      operationId: submitActivityVote
      tags: [activities]
      summary: Submit a swipe vote on an activity
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityVoteInput"
      responses:
        "201":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityVote"

  /events/{shareCode}/activity-matches:
    get:
      operationId: getActivityMatches
      tags: [activities]
      summary: Get activities that matched (all participants swiped right)
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matched activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityMatch"

  /events/{shareCode}/summary:
    get:
      operationId: getEventSummary
      tags: [events]
      summary: Get event summary for the shareable sticker
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSummary"
        "404":
          description: Event not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Event:
      type: object
      required: [id, shareCode, name, emoji, mode, dates, createdAt]
      properties:
        id:
          type: integer
        shareCode:
          type: string
        name:
          type: string
        emoji:
          type: string
        mode:
          type: string
          description: "date | activity | both"
        dates:
          type: array
          items:
            type: string
          description: ISO date strings chosen by organizer
        createdAt:
          type: string
          format: date-time
        participantCount:
          type: integer

    EventInput:
      type: object
      required: [name, emoji]
      properties:
        name:
          type: string
          minLength: 1
        emoji:
          type: string
          minLength: 1
        mode:
          type: string
          description: "date | activity | both"
          default: both
        dates:
          type: array
          items:
            type: string
          description: ISO date strings chosen by organizer
          default: []

    Participant:
      type: object
      required: [id, eventId, name, createdAt]
      properties:
        id:
          type: integer
        eventId:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    ParticipantInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    AvailabilitySlot:
      type: object
      required: [id, participantId, eventId, date, timeBlock]
      properties:
        id:
          type: integer
        participantId:
          type: integer
        eventId:
          type: integer
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)
        timeBlock:
          type: string
          description: "morning | afternoon | evening | night"

    AvailabilityInput:
      type: object
      required: [participantId, slots]
      properties:
        participantId:
          type: integer
        slots:
          type: array
          items:
            type: object
            required: [date, timeBlock]
            properties:
              date:
                type: string
              timeBlock:
                type: string

    BestSlot:
      type: object
      required: [date, timeBlock, participantCount, totalParticipants]
      properties:
        date:
          type: ["string", "null"]
        timeBlock:
          type: ["string", "null"]
        participantCount:
          type: integer
        totalParticipants:
          type: integer
        hasMatch:
          type: boolean

    Activity:
      type: object
      required: [id, name, emoji, category]
      properties:
        id:
          type: integer
        name:
          type: string
        emoji:
          type: string
        category:
          type: string

    ActivityVoteInput:
      type: object
      required: [participantId, activityId, liked]
      properties:
        participantId:
          type: integer
        activityId:
          type: integer
        liked:
          type: boolean

    ActivityVote:
      type: object
      required: [id, participantId, activityId, liked]
      properties:
        id:
          type: integer
        participantId:
          type: integer
        activityId:
          type: integer
        liked:
          type: boolean

    ActivityMatch:
      type: object
      required: [activityId, name, emoji, category, likeCount, totalParticipants]
      properties:
        activityId:
          type: integer
        name:
          type: string
        emoji:
          type: string
        category:
          type: string
        likeCount:
          type: integer
        totalParticipants:
          type: integer
        isMatch:
          type: boolean

    EventSummary:
      type: object
      required: [id, shareCode, name, emoji, participantCount, createdAt]
      properties:
        id:
          type: integer
        shareCode:
          type: string
        name:
          type: string
        emoji:
          type: string
        participantCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        bestDate:
          type: ["string", "null"]
        bestTimeBlock:
          type: ["string", "null"]
        topActivity:
          type: ["string", "null"]
        topActivityEmoji:
          type: ["string", "null"]
